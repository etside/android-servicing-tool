name: Build & Release

on:
  push:
    branches: [master]
    tags: ["v*"]
  workflow_dispatch:

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: unlock_tool/requirements-ci.txt

      - name: Install system deps
        run: sudo apt-get update && sudo apt-get install -y libusb-1.0-0-dev libgl1

      - name: Install Python deps
        working-directory: unlock_tool
        run: pip install -r requirements-ci.txt pyinstaller==6.11.1

      - name: Build
        working-directory: unlock_tool
        run: pyinstaller build.spec --noconfirm --clean

      - name: Package
        run: |
          TAG="${{ github.ref_name }}"
          tar -czf android-servicing-tool-${TAG}-linux-x86_64.tar.gz -C unlock_tool/dist unlock_tool/

      - uses: actions/upload-artifact@v4
        with:
          name: linux-release
          path: android-servicing-tool-*.tar.gz

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          name: "Android Servicing Tool ${{ github.ref_name }}"
          generate_release_notes: true
          files: android-servicing-tool-*.tar.gz

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: unlock_tool/requirements-ci.txt

      - name: Install Python deps
        working-directory: unlock_tool
        run: pip install -r requirements-ci.txt pyinstaller==6.11.1

      - name: Build
        working-directory: unlock_tool
        run: pyinstaller build_windows.spec --noconfirm --clean

      - name: Package
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"
          Compress-Archive -Path unlock_tool\dist\unlock_tool -DestinationPath "android-servicing-tool-${tag}-windows-x86_64.zip"

      - uses: actions/upload-artifact@v4
        with:
          name: windows-release
          path: android-servicing-tool-*.zip

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          name: "Android Servicing Tool ${{ github.ref_name }}"
          generate_release_notes: true
          files: android-servicing-tool-*.zip
